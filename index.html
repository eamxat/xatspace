<!DOCTYPE html>
<!-- CODIGO CREADO POR EAM96 -->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Xat Cities</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/eamxat/Images/refs/heads/main/favicon-16x16.png">
    <style>
        :root {
            /* MODO DÍA (Valores por defecto) */
            --sky-top: #6ab0ff;
            --sky-bottom: #e0f6ff;
            
            --bg-build: #7a9ebf;
            --mg-build: #527598;
            --fg-build: #2c445e;
            
            --win-day: #94b5d6;
            --win-night: #ffebb5;
            
            --sun-opacity: 1;
            --moon-opacity: 0;
            --sun-y: 0vh;
            --moon-y: 60vh;
            
            --star-opacity: 0;
            
            --cloud-opacity: 0.85;
            --cloud-filter: grayscale(0%) brightness(1) drop-shadow(0 15px 15px rgba(0,0,0,0.05));
            --bird-opacity: 1;
        }

        /* MODO NOCHE */
        body:has(#dn-toggle:checked) {
            --sky-top: #060814;
            --sky-bottom: #1a2245;
            
            --bg-build: #111521;
            --mg-build: #0a0d14;
            --fg-build: #030406;
            
            --sun-opacity: 0;
            --moon-opacity: 1;
            --sun-y: 60vh;
            --moon-y: 0vh;
            
            --star-opacity: 1;
            
            --cloud-opacity: 0.15;
            --cloud-filter: grayscale(100%) brightness(0.2) drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            --bird-opacity: 0;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--sky-top);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent; /* Evita destello al tocar en móvil */
        }

        input[type="checkbox"] {
            display: none;
        }

        /* ========================================================
           ESCENA PRINCIPAL
           ======================================================== */
        .scene {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-bottom) 100%);
            transition: background 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            z-index: 1;
            -webkit-transform: translateZ(0); /* Forzar GPU */
            transform: translateZ(0);
        }

        /* Astros */
        .celestial-sun, .celestial-moon {
            position: absolute;
            top: 10vh; right: 12vw;
            width: 140px; height: 140px;
            transition: transform 2.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 2.5s ease;
            z-index: 2;
            pointer-events: none;
        }

        .celestial-sun {
            border-radius: 50%;
            background: linear-gradient(135deg, #FFEFBA, #FFFFFF);
            box-shadow: 0 0 40px 15px rgba(255, 215, 0, 0.4), 0 0 100px 35px rgba(255, 215, 0, 0.2);
            opacity: var(--sun-opacity);
            transform: translateY(var(--sun-y));
        }

        .celestial-moon {
            background-image: url('https://i.imgur.com/9dBMA6A.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 0 20px rgba(180, 210, 255, 0.4)) 
                    drop-shadow(0 0 50px rgba(180, 210, 255, 0.2));
            opacity: var(--moon-opacity);
            transform: translateY(var(--moon-y));
        }

        /* Estrellas */
        .stars-container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            opacity: var(--star-opacity);
            transition: opacity 1.5s ease;
            z-index: 1;
            pointer-events: none;
        }

        .star-layer {
            position: absolute;
            top: 0; left: 0;
            background: transparent;
            border-radius: 50%;
        }

        .stars-xs { width: 1px; height: 1px; box-shadow: 2vw 5vh #fff, 10vw 62vh #fff, 20vw 42vh #fff, 30vw 12vh #fff, 40vw 38vh #fff, 50vw 35vh #fff, 60vw 80vh #fff, 70vw 45vh #fff, 80vw 65vh #fff, 90vw 18vh #fff, 98vw 35vh #fff; animation: twinkle-1 6s infinite ease-in-out; }
        .stars-sm { width: 1.5px; height: 1.5px; box-shadow: 5vw 12vh #fff, 15vw 42vh #fff, 25vw 75vh #fff, 35vw 30vh #fff, 45vw 65vh #fff, 55vw 82vh #fff, 65vw 5vh #fff, 75vw 70vh #fff, 85vw 48vh #fff, 95vw 62vh #fff; animation: twinkle-2 4.5s infinite ease-in-out 1s; }
        @keyframes twinkle-1 { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.9; } }
        @keyframes twinkle-2 { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* Nubes */
        .clouds-img-container, .night-clouds-container {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 3;
        }
        
        .cloud-img, .night-cloud {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            will-change: transform;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }

        /* Nubes Día */
        .clouds-img-container { transition: opacity 1.5s ease, visibility 1.5s; }
        body:has(#dn-toggle:checked) .clouds-img-container { opacity: 0; visibility: hidden; }
        .cloud-img { background-image: url('https://i.imgur.com/wnGcbk7.png'); filter: var(--cloud-filter); }
        .c-img-1 { left: -50vw; top: 5vh;  width: 35vw; height: 18vh; animation: drift 70s linear infinite; }
        .c-img-2 { left: 100vw; top: 15vh; width: 45vw; height: 22vh; animation: drift-rtl 85s linear infinite; }

        /* Nubes Noche */
        .night-clouds-container { opacity: 0; visibility: hidden; transition: opacity 1.5s ease, visibility 1.5s; }
        body:has(#dn-toggle:checked) .night-clouds-container { opacity: 1; visibility: visible; }
        .night-cloud { background-image: url('https://i.imgur.com/l6ozuVU.png'); opacity: 0.35; }
        .nc-1 { top: 8vh; left: -40vw; width: 25vw; height: 12vh; animation: drift 80s linear infinite; }
        .nc-2 { top: 22vh; left: 100vw; width: 16vw; height: 8vh; animation: drift-rtl 90s linear infinite; }

        @keyframes drift { 0% { transform: translateX(0); } 100% { transform: translateX(160vw); } }
        @keyframes drift-rtl { 0% { transform: translateX(0); } 100% { transform: translateX(-160vw); } }

        /* Aves y Avión */
        .birds-container {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; opacity: var(--bird-opacity); transition: opacity 1s ease; z-index: 4;
        }

        .bird { position: relative; width: 16px; height: 10px; }
        .bird::before, .bird::after { content: ''; position: absolute; top: 0; width: 10px; height: 8px; border-top: 2px solid var(--fg-build); border-radius: 50%; }
        .bird::before { left: 0; transform-origin: right center; animation: flap-left 0.4s infinite alternate ease-in-out; }
        .bird::after { right: 0; transform-origin: left center; animation: flap-right 0.4s infinite alternate ease-in-out; }
        @keyframes flap-left { 0% { transform: rotate(15deg); } 100% { transform: rotate(-40deg); } }
        @keyframes flap-right { 0% { transform: rotate(-15deg); } 100% { transform: rotate(40deg); } }

        .flock-1 { position: absolute; top: 25vh; left: -10vw; animation: fly-across 35s linear infinite; }
        @keyframes fly-across { 0% { transform: translateX(0vw); } 100% { transform: translateX(120vw); } }

        /* Globo y Avión/OVNI */
        .day-balloon-wrapper, .night-air-wrapper { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 4; }
        
        .day-balloon {
            position: absolute; width: clamp(45px, 5.5vw, 75px); height: clamp(65px, 8vw, 110px);
            background: url('https://i.ibb.co/27ms4qJW/a-balloonfx-40.webp') no-repeat center/contain;
            animation: float-balloon-dynamic 55s ease-in-out infinite;
        }
        @keyframes float-balloon-dynamic { 0% { transform: translate(15vw, 110vh); opacity: 0; } 2% { opacity: 1; } 20% { opacity: 1; } 22% { transform: translate(15vw, -25vh); opacity: 0; } 100% { opacity: 0; } }

        .night-airplane { position: absolute; top: 12vh; width: 80px; height: 25px; background: url('https://i.imgur.com/pGr5IRf.png') no-repeat center/contain; animation: fly-airplane-sync 80s linear infinite; }
        .night-ufo { position: absolute; top: 25vh; width: 70px; height: 30px; background: url('https://i.ibb.co/LD2nvcw9/a-saucer-80.webp') no-repeat center/contain; animation: fly-ufo-sync 80s linear infinite; }
        @keyframes fly-airplane-sync { 0% { transform: translateX(-20vw); opacity: 0; } 5% { opacity: 1; } 45% { opacity: 1; } 50% { transform: translateX(120vw); opacity: 0; } 100% { opacity: 0; } }
        @keyframes fly-ufo-sync { 0% { opacity: 0; } 50% { transform: translateX(120vw); opacity: 0; } 55% { opacity: 1; } 95% { opacity: 1; } 100% { transform: translateX(-20vw); opacity: 0; } }

        /* ========================================================
           ARQUITECTURA Y LOGO (CROSS-BROWSER FIX)
           ======================================================== */
        .cityscape {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: max(100vw, 160vh); z-index: 10; pointer-events: none;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }

        .city-img {
            width: 100%; height: auto; display: block; transition: opacity 1.5s ease;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        .city-night { position: absolute; top: 0; left: 0; opacity: 0; }
        body:has(#dn-toggle:checked) .city-day { opacity: 0; }
        body:has(#dn-toggle:checked) .city-night { opacity: 1; }

        .xat-logo {
            position: absolute; bottom: 62%; right: 25.8%; width: 4%; display: block;
            z-index: 50; pointer-events: auto;
            -webkit-transition: transform 0.3s ease;
            transition: transform 0.3s ease;
        }
        .xat-logo img { width: 100%; height: auto; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
        @media (hover: hover) { .xat-logo:hover { transform: scale(1.08); } }

        /* Vehículos y Faros */
        .traffic-container { position: absolute; bottom: 0; left: 0; width: 100vw; height: 15vh; z-index: 11; pointer-events: none; }
        .car { position: absolute; opacity: 0; will-change: transform, opacity; }
        .car::before, .car::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; transition: opacity 1.5s ease; }
        .car::before { opacity: 1; }
        body:has(#dn-toggle:checked) .car::before { opacity: 0; }
        .car::after { opacity: 0; }
        body:has(#dn-toggle:checked) .car::after { opacity: 1; }

        .car-left { bottom: 6vh; width: clamp(90px, 10vw, 140px); height: 50px; }
        .car-left::before { background-image: url('https://i.imgur.com/eGXTsls.png'); }
        .car-left::after { background-image: url('https://i.imgur.com/XQefBzx.png'); }
        
        .car-right { bottom: 1.5vh; width: clamp(110px, 12vw, 160px); height: 60px; }
        .car-right::before { background-image: url('https://i.imgur.com/9PnCMLK.png'); }
        .car-right::after { background-image: url('https://i.imgur.com/37ETms4.png'); }

        .headlight-svg {
            position: absolute; top: 60%; opacity: 0; visibility: hidden;
            transition: opacity 1.5s ease, visibility 1.5s; pointer-events: none; z-index: -1;
            mix-blend-mode: screen; overflow: visible;
        }
        body:has(#dn-toggle:checked) .headlight-svg { opacity: 1; visibility: visible; }
        .car-left .headlight-svg { left: 60%; width: 45vw; height: 22vw; transform: translateY(-50%); }
        .car-right .headlight-svg { right: 60%; width: 50vw; height: 25vw; transform: translateY(-50%) scaleX(-1); }

        @keyframes drive-ltr { 0% { transform: translateX(-30vw); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateX(130vw); opacity: 0; } }
        @keyframes drive-rtl { 0% { transform: translateX(130vw); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateX(-30vw); opacity: 0; } }
        .cl-1 { animation: drive-ltr 14s linear infinite; }
        .cr-1 { animation: drive-rtl 12s linear infinite; }

        /* Panel de Control */
        #main-panel {
            position: fixed; top: 65px; left: 0; width: max-content; height: 34px;
            display: flex; align-items: center; gap: 15px; padding: 0 10px 0 15px;
            background: rgba(15, 15, 15, 0.95); -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 6px; z-index: 2147483647;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }
        .toggle-track { width: 44px; height: 20px; background: rgba(255,255,255,0.2); border-radius: 20px; cursor: pointer; position: relative; }
        .toggle-thumb { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: #fff; border-radius: 50%; transition: transform 0.4s; }
        #dn-toggle:checked ~ #main-panel .toggle-thumb { transform: translateX(24px); }

    </style>
</head>
<body>

    <input type="checkbox" id="dn-toggle">

    <div id="main-panel">
        <div style="display:flex; align-items:center; gap:8px; font-size:11px; color:#ddd; -webkit-user-select:none; user-select:none;">
            <b>Tiempo:</b>
            <label for="dn-toggle" class="toggle-track">
                <span style="position:absolute; left:4px; font-size:10px;">☀️</span>
                <span style="position:absolute; right:4px; font-size:10px;">🌙</span>
                <div class="toggle-thumb"></div>
            </label>
        </div>
        <div style="width:1px; height:18px; background:rgba(255,255,255,0.2);"></div>
        <span style="color:#aaa; font-size:11px; font-style:italic;">Xat.com</span>
    </div>

    <div class="scene">
        <!-- Filtros SVG -->
        <svg style="width:0; height:0; position:absolute; visibility:hidden;">
            <defs>
                <filter id="beamBlur" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="20" />
                </filter>
                <radialGradient id="beamGrad" cx="0%" cy="50%" r="100%">
                    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
                    <stop offset="20%" stop-color="#fff5cc" stop-opacity="0.6" />
                    <stop offset="80%" stop-color="#ffe885" stop-opacity="0" />
                </radialGradient>
            </defs>
        </svg>

        <div class="celestial-sun"></div>
        <div class="celestial-moon"></div>

        <div class="stars-container">
            <div class="star-layer stars-xs"></div>
            <div class="star-layer stars-sm"></div>
        </div>
        
        <div class="clouds-img-container">
            <div class="cloud-img c-img-1"></div>
            <div class="cloud-img c-img-2"></div>
        </div>

        <div class="night-clouds-container">
            <div class="night-cloud nc-1"></div>
            <div class="night-cloud nc-2"></div>
        </div>

        <div class="birds-container">
            <div class="flock-1">
                <div class="bird" style="top:0; left:0;"></div>
                <div class="bird" style="top:-15px; left:-20px;"></div>
            </div>
        </div>

        <div class="day-balloon-wrapper">
            <div class="day-balloon"></div>
        </div>

        <div class="night-air-wrapper">
            <div class="night-airplane"></div>
            <div class="night-ufo"></div>
        </div>

        <div class="cityscape">
            <img class="city-img city-day" src="https://i.imgur.com/y3TvGLg.png" alt="Día">
            <img class="city-img city-night" src="https://i.imgur.com/gvh1Czo.png" alt="Noche">
            
            <a href="https://xat.com" target="_blank" rel="noopener noreferrer" class="xat-logo">
                <img src="https://raw.githubusercontent.com/eamxat/Images/7af4ec4622f89c3c332964539fc5991e7a6050bd/xatlogo%20text2.svg" alt="XAT">
            </a>
        </div>

        <div class="traffic-container">
            <div class="car car-left cl-1">
                <svg class="headlight-svg" viewBox="0 0 800 400" preserveAspectRatio="none">
                    <ellipse cx="400" cy="200" rx="300" ry="100" fill="url(#beamGrad)" filter="url(#beamBlur)" />
                </svg>
            </div>
            <div class="car car-right cr-1">
                <svg class="headlight-svg" viewBox="0 0 800 400" preserveAspectRatio="none">
                    <ellipse cx="400" cy="200" rx="300" ry="100" fill="url(#beamGrad)" filter="url(#beamBlur)" />
                </svg>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) || (e.ctrlKey && ['U','S'].includes(e.key.toUpperCase()))) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
